coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: auto
        threshold: 5%

flags:
  rust:
    paths:
      - src/
  typescript:
    paths:
      - npm/obsidian-mcp-rs/src/

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
