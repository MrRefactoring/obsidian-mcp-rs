name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - name: Compile benchmarks (no run)
        run: cargo bench --no-run

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Rust coverage ──────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Rust – collect lcov
        run: cargo llvm-cov --lcov --output-path lcov-rust.info

      # ── TypeScript coverage ────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm install
        run: npm install
        working-directory: npm/obsidian-mcp-rs
      - name: TS – collect lcov
        run: npx vitest run --coverage
        working-directory: npm/obsidian-mcp-rs

      # ── Upload both reports to Codecov ─────────────────────────────────────
      - name: Upload Rust coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov-rust.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          comment: false

      - name: Upload TypeScript coverage
        uses: codecov/codecov-action@v4
        with:
          files: npm/obsidian-mcp-rs/coverage/lcov.info
          flags: typescript
          token: ${{ secrets.CODECOV_TOKEN }}
          comment: true

  check-targets:
    name: Check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo check --target ${{ matrix.target }}

  npm-build:
    name: npm wrapper build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
        working-directory: npm/obsidian-mcp-rs
      - run: npm run build
        working-directory: npm/obsidian-mcp-rs
      - run: npm test
        working-directory: npm/obsidian-mcp-rs
