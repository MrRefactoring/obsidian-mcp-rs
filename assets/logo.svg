<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#1e1e2e"/>

  <!-- Obsidian crystal — left dark face -->
  <polygon points="128,32 48,104 128,156" fill="#4c1d95"/>
  <!-- Obsidian crystal — right lighter face -->
  <polygon points="128,32 208,104 128,156" fill="#7c3aed"/>
  <!-- Obsidian crystal — bottom left face -->
  <polygon points="48,104 128,224 128,156" fill="#3b0764"/>
  <!-- Obsidian crystal — bottom right face -->
  <polygon points="208,104 128,224 128,156" fill="#5b21b6"/>

  <!-- Edge highlight -->
  <line x1="128" y1="32" x2="128" y2="156" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- MCP connection nodes (Rust orange) -->
  <circle cx="128" cy="32"  r="8" fill="#f97316"/>
  <circle cx="208" cy="104" r="8" fill="#f97316"/>
  <circle cx="128" cy="224" r="8" fill="#f97316"/>
  <circle cx="48"  cy="104" r="8" fill="#f97316"/>

  <!-- Center glow -->
  <circle cx="128" cy="156" r="5" fill="#fb923c" opacity="0.7"/>
</svg>
